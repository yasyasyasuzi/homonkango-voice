<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>訪問看護ステーション｜音声記録</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1318;
  --bg2: #161b22;
  --surface: #1c2333;
  --surface2: #212940;
  --border: #2d3748;
  --border2: #3a4660;
  --text: #e8edf5;
  --text-soft: #8b96ae;
  --text-faint: #4a5568;

  --nurse: #38bdf8;
  --nurse-dim: rgba(56,189,248,0.12);
  --nurse-border: rgba(56,189,248,0.3);

  --pt: #34d399;
  --pt-dim: rgba(52,211,153,0.12);
  --pt-border: rgba(52,211,153,0.3);

  --ot: #f59e0b;
  --ot-dim: rgba(245,158,11,0.12);
  --ot-border: rgba(245,158,11,0.3);

  --accent: #38bdf8;
  --accent-dim: rgba(56,189,248,0.12);
  --danger: #f87171;
  --danger-dim: rgba(248,113,113,0.12);
  --ai: #a78bfa;
  --ai-dim: rgba(167,139,250,0.1);
  --ai-border: rgba(167,139,250,0.3);

  --radius: 14px;
  --radius-sm: 9px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  position: sticky; top: 0; z-index: 100;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.logo {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px; font-weight: 600;
  color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.logo-badge {
  background: var(--accent-dim);
  border: 1px solid var(--nurse-border);
  color: var(--nurse);
  font-size: 10px; font-weight: 700;
  padding: 3px 8px; border-radius: 100px;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.08em;
}

/* 職種タブ */
.role-tabs {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
}
.role-tab {
  padding: 12px 4px;
  border-radius: 100px;
  border: 2px solid var(--border);
  background: transparent;
  color: var(--text-soft);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  letter-spacing: 0.03em;
}
.role-tab[data-role="nurse"] { background: #1976d2; border-color: #1976d2; color: white; opacity: 0.45; }
.role-tab[data-role="pt"]    { background: #388e3c; border-color: #388e3c; color: white; opacity: 0.45; }
.role-tab[data-role="ot"]    { background: #e65100; border-color: #e65100; color: white; opacity: 0.45; }
.role-tab[data-role="nurse"].active { background: #1976d2; border-color: #1976d2; color: white; opacity: 1; }
.role-tab[data-role="pt"].active   { background: #388e3c; border-color: #388e3c; color: white; opacity: 1; }
.role-tab[data-role="ot"].active   { background: #e65100; border-color: #e65100; color: white; opacity: 1; }

/* ── MAIN ── */
.main { padding: 16px 14px 120px; max-width: 520px; margin: 0 auto; }

/* ── MIC SECTION ── */
.mic-section { display: none; }
.mic-outer {
  position: relative; display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
}
.mic-ring1, .mic-ring2 {
  position: absolute; border-radius: 50%;
  border: 1.5px solid var(--accent);
  opacity: 0; pointer-events: none;
}
.mic-ring1 { width: 140px; height: 140px; }
.mic-ring2 { width: 170px; height: 170px; }
.mic-btn {
  width: 110px; height: 110px; border-radius: 50%;
  border: none; cursor: pointer;
  background: #e8f5e9;
  border: 3px solid #c8e6c9;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
  position: relative; z-index: 1;
  box-shadow: 0 0 32px rgba(56,180,100,0.2);
  padding: 0;
}
.mic-btn:active { transform: scale(0.91); }
.mic-btn.role-pt { background: #e8f5e9; border-color: #c8e6c9; box-shadow: 0 0 24px rgba(52,211,153,0.15); }
.mic-btn.role-ot { background: #fff8e1; border-color: #ffe082; box-shadow: 0 0 24px rgba(245,158,11,0.15); }

.mic-btn.recording {
  background: #fce4ec;
  border-color: #f48fb1;
  box-shadow: 0 0 32px rgba(248,113,113,0.25);
  animation: mic-pulse 1.3s infinite ease-in-out;
}
@keyframes mic-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

.mic-btn.recording ~ .mic-ring1, .mic-outer.recording .mic-ring1 { animation: ring1 1.6s infinite ease-out; }
.mic-outer.recording .mic-ring2 { animation: ring2 1.6s infinite ease-out 0.4s; }
.mic-ring1 { border-color: #e63946; }
.mic-ring2 { border-color: #e63946; }
@keyframes ring1 { 0%{opacity:.5;transform:scale(1)} 100%{opacity:0;transform:scale(1.7)} }
@keyframes ring2 { 0%{opacity:.3;transform:scale(1)} 100%{opacity:0;transform:scale(1.5)} }

.mic-status {
  font-size: 15px; font-weight: 600; letter-spacing: 0.05em;
  color: var(--text-soft); text-align: center;
  font-family: 'Noto Serif JP', serif;
}
.mic-status.recording { color: var(--danger); }
.mic-timer {
  font-size: 22px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text); margin: 4px 0 2px;
  font-family: 'Noto Serif JP', serif;
  letter-spacing: 0.05em;
  opacity: 0; transition: opacity 0.3s;
}
.mic-timer.visible { opacity: 1; }

/* ── LIVE BOX ── */
.live-wrap { margin-bottom: 14px; }
.section-label {
  font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
  color: var(--text-soft);
  font-family: 'Noto Serif JP', serif;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.section-label .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-faint);
}
.section-label .dot.live { background: var(--danger); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.live-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  min-height: 54px;
  font-size: 16px; line-height: 1.85;
  color: var(--text-soft);
  font-style: italic;
  transition: border-color 0.3s, color 0.3s;
}
.live-box.active { border-color: rgba(248,113,113,0.4); color: var(--text); font-style: normal; }

/* ── TRANSCRIPT ── */
.text-section { margin-bottom: 14px; }
.text-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 7px;
}
.char-count { font-size: 11px; color: var(--text-faint); }

.transcript-area {
  width: 100%;
  min-height: 130px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px; line-height: 1.9;
  color: var(--text);
  resize: vertical; outline: none;
  transition: border-color 0.2s;
}
.transcript-area:focus { border-color: var(--border2); }
.transcript-area::placeholder { color: var(--text-faint); }

/* ── AI SECTION ── */
.ai-section { margin-bottom: 14px; }
.ai-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 7px;
}
.ai-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--ai-dim);
  border: 1px solid var(--ai-border);
  color: var(--ai);
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 100px;
  letter-spacing: 0.08em;
}
.ai-output {
  background: var(--surface);
  border: 1px solid var(--ai-border);
  border-radius: var(--radius);
  padding: 14px;
  min-height: 130px;
  font-size: 16px; line-height: 1.9;
  color: var(--text);
  white-space: pre-wrap;
  position: relative;
}
.ai-output .placeholder { color: var(--text-faint); font-style: italic; }
.ai-loading {
  display: none; align-items: center; gap: 8px;
  padding: 14px;
  color: var(--ai);
  font-size: 13px;
}
.ai-loading.show { display: flex; }
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--ai-dim);
  border-top-color: var(--ai);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── BUTTONS ── */
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.btn {
  padding: 16px 8px;
  border-radius: 100px;
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text-soft);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.15s;
  letter-spacing: 0.03em;
}
.btn:active { transform: scale(0.96); }
.btn-ai {
  grid-column: 1 / -1;
  background: var(--ai-dim);
  border-color: var(--ai-border);
  color: var(--ai);
  padding: 18px;
  font-size: 16px;
  border-radius: 100px;
}
.btn-ai:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-copy { border-color: var(--border2); }
.btn-clear { color: var(--danger); border-color: rgba(248,113,113,0.25); background: var(--danger-dim); }

/* ── TERMS PANEL ── */
.terms-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 14px;
}
.terms-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px;
  cursor: pointer; user-select: none;
  background: var(--bg2);
}
.terms-head-left {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; font-weight: 700; color: var(--text-soft);
}
.terms-arrow { font-size: 10px; color: var(--text-faint); transition: transform 0.2s; }
.terms-arrow.open { transform: rotate(180deg); }
.terms-body-inner { display: none; padding: 12px 14px; border-top: 1px solid var(--border); }
.terms-body-inner.open { display: block; }
.terms-role-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  color: var(--text-faint); text-transform: uppercase; margin-bottom: 8px;
}
.terms-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.term-chip {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text-soft);
  padding: 3px 9px; border-radius: 6px; font-size: 11px;
}
.term-chip.nurse { border-color: var(--nurse-border); color: var(--nurse); background: var(--nurse-dim); }
.term-chip.pt    { border-color: var(--pt-border);    color: var(--pt);    background: var(--pt-dim);    }
.term-chip.ot    { border-color: var(--ot-border);    color: var(--ot);    background: var(--ot-dim);    }

.terms-add { display: flex; gap: 6px; }
.terms-input {
  flex: 1; padding: 8px 11px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px; color: var(--text); outline: none;
}
.terms-input:focus { border-color: var(--border2); }
.terms-add-btn {
  padding: 8px 14px;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600; cursor: pointer;
}



/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); padding: 10px 20px; border-radius: 100px;
  font-size: 12px; font-weight: 500;
  opacity: 0; transition: all 0.28s; pointer-events: none; z-index: 300;
  white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.privacy-banner {
  display: flex; align-items: flex-start; gap: 10px;
  background: rgba(167,139,250,0.08);
  border: 1px solid rgba(167,139,250,0.2);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 14px;
}
.privacy-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.privacy-text { flex: 1; }
.privacy-title { font-size: 12px; font-weight: 700; color: var(--ai); margin-bottom: 3px; }
.privacy-desc { font-size: 11px; color: var(--text-soft); line-height: 1.6; }
.anon-btn {
  flex-shrink: 0;
  padding: 6px 12px;
  background: var(--ai-dim); border: 1px solid var(--ai-border);
  color: var(--ai); border-radius: var(--radius-sm);
  font-size: 11px; font-weight: 700; cursor: pointer;
  font-family: "Noto Sans JP", sans-serif;
  white-space: nowrap;
}

/* ── WARN ── */
.fixed-mic {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 12px 16px 28px;
  z-index: 200;
  display: flex;
  justify-content: center;
}
.fixed-mic-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  max-width: 520px;
  width: 100%;
}
.mic-status-fixed {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-soft);
  letter-spacing: 0.06em;
}
.mic-status-fixed.recording {
  color: var(--danger);
}
.mic-timer {
  font-size: 18px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  font-family: "Shippori Mincho B1", serif;
  opacity: 0;
  transition: opacity 0.3s;
}
.mic-timer.visible { opacity: 1; }

/* メインのpadding-bottomを大きくして固定ボタンと重ならないように */
.main { padding-bottom: 220px; }

.warn-box {
  background: var(--danger-dim); border: 1px solid rgba(248,113,113,0.3);
  border-radius: var(--radius); padding: 12px 14px;
  font-size: 12px; color: var(--danger); margin-bottom: 14px; display: none;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      🏥 訪問看護ステーション
      <span class="logo-badge">音声記録</span>
    </div>
  </div>
  <div class="role-tabs">
    <button class="role-tab active" data-role="nurse" onclick="setRole('nurse')">看護師</button>
    <button class="role-tab" data-role="pt" onclick="setRole('pt')">PT</button>
    <button class="role-tab" data-role="ot" onclick="setRole('ot')">OT</button>
  </div>
</div>

<div class="main">

  <div class="warn-box" id="warnBox">
    ⚠️ このブラウザは音声認識に対応していません。Chrome または Edge をお使いください。
  </div>

  <!-- MIC -->
  <div class="mic-section">
    <div class="mic-outer" id="micOuter">
      <div class="mic-ring1" id="micRing1"></div>
      <div class="mic-ring2" id="micRing2"></div>
      <button class="mic-btn" id="micBtn" onclick="toggleRecording()">START</button>
    </div>
    <div class="mic-timer" id="micTimer">0:00</div>
    <div class="mic-status" id="micStatus">タップして録音開始</div>
  </div>

  <!-- LIVE -->
  <div class="live-wrap">
    <div class="section-label"><div class="dot live" id="liveDot" style="background:var(--text-faint)"></div>リアルタイム認識</div>
    <div class="live-box" id="liveBox">話し始めるとここに表示されます…</div>
  </div>

  <!-- TRANSCRIPT -->
  <div class="text-section">
    <div class="text-header">
      <div class="section-label" style="margin:0"><div class="dot"></div>録音テキスト（編集可）</div>
      <div class="char-count" id="charCount">0文字</div>
    </div>
    <textarea class="transcript-area" id="transcriptArea" placeholder="録音したテキストがここに蓄積されます。直接編集もできます。"></textarea>
  </div>

  <!-- 個人情報注意 -->
  <div class="privacy-banner">
    <div class="privacy-icon">🔒</div>
    <div class="privacy-text">
      <div class="privacy-title">個人情報の取り扱いについて</div>
      <div class="privacy-desc">氏名・住所などの個人情報は入力しないでください。「●●様」などに置き換えてご使用ください。</div>
    </div>
    <button class="anon-btn" onclick="anonymize()" title="固有名詞を自動匿名化">匿名化</button>
  </div>



  <!-- AI OUTPUT -->
  <div class="ai-section">
    <div class="ai-header">
      <div class="section-label" style="margin:0"><div class="dot" style="background:var(--ai)"></div>AI清書</div>
      <div class="ai-badge">✦ Claude</div>
    </div>
    <div class="ai-loading" id="aiLoading">
      <div class="spinner"></div>
      <span>AI が清書中…</span>
    </div>
    <div class="ai-output" id="aiOutput">
      <span class="placeholder">「AI清書」ボタンを押すと、録音テキストを報告書文体に整形します。</span>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="btn-row">
    <button class="btn btn-ai" id="aiBtn" onclick="runAI()" disabled>✦ AI 清書する</button>
    <button class="btn btn-copy" onclick="copyText('transcript')">📋 録音テキストをコピー</button>
    <button class="btn btn-primary btn-copy" onclick="copyText('ai')" id="copyAiBtn" style="background:var(--ai);border-color:var(--ai);color:white;">✦ AI清書をコピー</button>
    <button class="btn btn-clear" onclick="clearAll()">🗑️ クリア</button>

  </div>

  <!-- TERMS（非表示・バックグラウンド動作） -->
  <div style="display:none">
    <div id="nurseTermsGrid"></div>
    <div id="ptTermsGrid"></div>
    <div id="otTermsGrid"></div>
    <span id="termCountBadge"></span>
    <input id="termInput">
  </div>



</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// 専門用語辞書
// ═══════════════════════════════════════════
const TERMS = {
  nurse: [

    '意識レベル','JCS','GCS','瞳孔','対光反射',
    '浮腫','褥瘡','発赤','びらん','壊死','ストーマ',
    '疼痛','NRS','VAS','圧痛','自発痛','安静時痛',
    '嚥下障害','誤嚥','吸引','喀痰','喀血',
    '尿量','排尿障害','カテーテル','尿路感染',
    '創傷処置','ガーゼ交換','縫合','デブリードマン',
    '点滴','皮下注射','筋肉注射','静脈留置針',
    '服薬管理','薬剤副作用','多剤併用','ポリファーマシー',
    '認知症','BPSD','せん妄','抑うつ',
    '在宅酸素','人工呼吸器','吸入療法','ネブライザー',
    '胃ろう','経鼻経管栄養','PEG','栄養状態',
    '悪化兆候','緊急連絡','主治医','ケアマネジャー',
  ],
  pt: [
    '関節可動域','ROM測定','他動ROM','自動ROM','制限因子',
    '筋力','MMT','徒手筋力検査','筋萎縮','廃用症候群',
    '筋緊張','痙縮','固縮','弛緩性麻痺','片麻痺','対麻痺',
    '拘縮','短縮','伸張','関節モビライゼーション',
    '歩行能力','歩行器','四脚杖','T字杖','歩行補助具',
    '歩行訓練','平行棒','屋外歩行','段差昇降',
    '立位バランス','座位バランス','Berg Balance Scale',
    '転倒リスク','転倒予防','骨折リスク',
    'ADL','BADL','IADL','FIM','BI','移乗','移動',
    '呼吸理学療法','排痰体位','胸郭可動性','横隔膜訓練',
    '疼痛管理','物理療法','温熱療法','電気療法','TENS',

const CORRECTIONS = {

function applyCorrections(text) {
  let r = text;
  for (const [k, v] of Object.entries(CORRECTIONS)) r = r.replace(new RegExp(k, 'g'), v);
  return r;
}

// ═══════════════════════════════════════════
// 状態
// ═══════════════════════════════════════════
let currentRole = 'nurse';
let isRecording = false;
let accumulated = '';
let timerInterval = null;
let seconds = 0;
let history = JSON.parse(localStorage.getItem('vn_history') || '[]');
let userTerms = JSON.parse(localStorage.getItem('vn_userterms') || '[]');
let aiText = '';

// ═══════════════════════════════════════════
// 職種切替
// ═══════════════════════════════════════════
function setRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));

// ═══════════════════════════════════════════
// 用語辞書描画
// ═══════════════════════════════════════════
function renderTerms() {
  ['nurse','pt','ot'].forEach(role => {
    const grid = document.getElementById(role + 'TermsGrid');
    const allRoleTerms = [...TERMS[role], ...userTerms.filter(u => u.role === role).map(u => u.term)];
    grid.innerHTML = allRoleTerms.map(t => `<div class="term-chip ${role}">${t}</div>`).join('');
  });

}

function addTerm() {
  const val = document.getElementById('termInput').value.trim();
  if (!val) return;
  userTerms.push({ role: currentRole, term: val });
  localStorage.setItem('vn_userterms', JSON.stringify(userTerms));
  renderTerms();
  document.getElementById('termInput').value = '';
  showToast(`「${val}」を追加しました`);

function toggleTerms() {

// ═══════════════════════════════════════════
// 音声認識
// ═══════════════════════════════════════════
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if (!SR) {
  document.getElementById('warnBox').style.display = 'block';
  document.getElementById('micBtn').disabled = true;
}

function buildRecognition() {
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        accumulated += applyCorrections(t);
        updateTranscript();
      } else {
        interim += t;
      }
    }
    updateLive(interim);
  };

  recognition.onerror = e => {
    if (e.error === 'no-speech') return;
    if (e.error === 'not-allowed') {
      showToast('マイクの許可が必要です。設定から許可してください。');
      stopRecording(); return;
    }
    showToast('認識エラー: ' + e.error);
    stopRecording();
  };

  recognition.onend = () => {
    if (isRecording) {
      try { recognition.start(); } catch(e) {
        buildRecognition();
        try { recognition.start(); } catch(e2) {}
      }
    }
  };
}

function toggleRecording() {
  if (isRecording) stopRecording(); else startRecording();
}

function startRecording() {
  if (!SR) return;
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
      stream.getTracks().forEach(t => t.stop());
      buildRecognition();
      isRecording = true;
      seconds = 0;
      timerInterval = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds/60), s = seconds%60;
        document.getElementById('micTimer').textContent = m+':'+String(s).padStart(2,'0');
      }, 1000);
      try { recognition.start(); } catch(e) {}
      setUI(true);
    })
    .catch(err => {
      showToast('マイクの許可が必要です。設定からSafariのマイクを許可してください。');
    });
}

function stopRecording() {
  isRecording = false;
  clearInterval(timerInterval);
  try { recognition.stop(); } catch(e){}
  updateLive('');
  setUI(false);
}

function setUI(rec) {
  const btn = document.getElementById('micBtn');
  const outer = document.getElementById('micOuter');
  const status = document.getElementById('micStatus');
  const timer = document.getElementById('micTimer');
  const liveBox = document.getElementById('liveBox');

  const MIC_SVG = `<svg width="64" height="64" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="26" cy="26" r="24" fill="#c8e6c9" opacity="0.6"/><rect x="19" y="10" width="14" height="22" rx="7" fill="#388e3c"/><rect x="21" y="13" width="5" height="7" rx="2.5" fill="white" opacity="0.45"/><path d="M12 26 Q12 38 26 38 Q40 38 40 26" stroke="#388e3c" stroke-width="2.5" stroke-linecap="round" fill="none"/><line x1="26" y1="38" x2="26" y2="44" stroke="#388e3c" stroke-width="2.5" stroke-linecap="round"/><line x1="18" y1="44" x2="34" y2="44" stroke="#388e3c" stroke-width="2.5" stroke-linecap="round"/><path d="M9 20 Q6 26 9 32" stroke="#66bb6a" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/><path d="M43 20 Q46 26 43 32" stroke="#66bb6a" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/><circle cx="6" cy="16" r="2.5" fill="#a5d6a7" opacity="0.8"/><circle cx="46" cy="16" r="2" fill="#a5d6a7" opacity="0.6"/></svg>`;
  const STOP_SVG = `<svg width="64" height="64" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="26" cy="26" r="24" fill="#fce4ec" opacity="0.7"/><rect x="17" y="17" width="18" height="18" rx="4" fill="#e91e63"/><rect x="20" y="20" width="6" height="6" rx="1" fill="white" opacity="0.5"/></svg>`;
  if (rec) {
    btn.classList.add('recording');
    outer.classList.add('recording');
    btn.innerHTML = STOP_SVG;
    status.textContent = '録音中 — タップして停止 (STOP)';
    status.classList.add('recording');
    timer.classList.add('visible');
    liveBox.classList.add('active');
    liveDot.classList.add('live');
  } else {
    btn.classList.remove('recording');
    outer.classList.remove('recording');
    btn.innerHTML = MIC_SVG;
    status.textContent = 'タップして録音開始 (START)';
    status.classList.remove('recording');
    timer.classList.remove('visible');
    liveBox.classList.remove('active');
    liveDot.classList.remove('live');
    liveBox.textContent = '話し始めるとここに表示されます…';
  }
  updateAiBtn();
}

function updateLive(text) {
  const box = document.getElementById('liveBox');
  box.textContent = text || (isRecording ? '（話してください…）' : '話し始めるとここに表示されます…');
}

function updateTranscript() {
  const area = document.getElementById('transcriptArea');
  area.value = accumulated;
  area.scrollTop = area.scrollHeight;
  updateCharCount();
  updateAiBtn();
}

function updateCharCount() {
  const len = document.getElementById('transcriptArea').value.length;
  document.getElementById('charCount').textContent = `${len}文字`;
}

function updateAiBtn() {
  const hasText = document.getElementById('transcriptArea').value.trim().length > 0;
  document.getElementById('aiBtn').disabled = !hasText;
}

document.getElementById('transcriptArea').addEventListener('input', () => {
  accumulated = document.getElementById('transcriptArea').value;
  updateCharCount();
  updateAiBtn();
});

// ═══════════════════════════════════════════
// AI 清書
// ═══════════════════════════════════════════
const ROLE_NAMES = { nurse: '訪問看護師', pt: '理学療法士（PT）', ot: '作業療法士（OT）' };

function anonymize() {
  const area = document.getElementById('transcriptArea');
  let text = area.value;
  if (!text.trim()) { showToast('テキストがありません'); return; }
  // 日本語の名前パターン（姓名）を匿名化
  // 「〇〇さん」「〇〇様」「〇〇氏」の前の名前を置換
  text = text.replace(/([ぁ-んァ-ン一-龯]{1,4})(さん|様|氏|さま)/g, '●●$2');
  // 「〇〇家」パターン
  text = text.replace(/([ぁ-んァ-ン一-龯]{1,3})家/g, '●●家');
  area.value = text;
  accumulated = text;
  updateCharCount();
  showToast('固有名詞を匿名化しました');
}

async function runAI() {
  const text = document.getElementById('transcriptArea').value.trim();
  if (!text) return;

  const loading = document.getElementById('aiLoading');
  const output = document.getElementById('aiOutput');
  const btn = document.getElementById('aiBtn');

  loading.classList.add('show');
  output.innerHTML = '';
  btn.disabled = true;

  const roleTerms = TERMS[currentRole].slice(0, 30).join('、');

  const PROMPTS = {
    nurse: `あなたは訪問看護師の記録をサポートするAIです。
以下の音声入力テキストを、訪問看護記録として適切な文体に清書してください。

【ルール】
- 記録文体（体言止め・過去形・客観的）で書く
- 個人名は「●●様」のまま記載する
- 以下の順で整理する（情報がある項目のみ）：
  【バイタルサイン】体温・血圧・脈拍・SpO2・呼吸数
  【ADL・生活状況】食事・移動・排泄・清潔・コミュニケーション
  【医療処置】褥瘡・吸引・経管栄養・酸素療法・服薬管理など
  【観察・経過】全身状態・症状の変化・訴えなど
  【今後の課題・申し送り】
- 意味が不明確な部分は「（要確認）」と記載する
- 専門用語を適切に使用する（${roleTerms}など）

【音声入力テキスト】
${text}

【清書後の記録文】`,

    pt: `あなたは理学療法士（PT）の訪問リハビリ記録をサポートするAIです。
以下の音声入力テキストを、SOAP形式の訪問リハビリ記録として清書してください。

【ルール】
- 記録文体（体言止め・過去形・客観的）で書く
- 個人名は「●●様」のまま記載する
- SOAP形式で整理する（情報がある項目のみ）：
  【S（主観的情報）】利用者・家族の訴え、自覚症状
  【O（客観的情報）】ROM・MMT・歩行能力・バランス評価・バイタルなど
  【A（評価・考察）】機能の変化、目標達成度、リスク評価
  【P（次回計画）】次回のリハビリプログラム・目標
- 意味が不明確な部分は「（要確認）」と記載する
- 専門用語を適切に使用する（${roleTerms}など）

【音声入力テキスト】
${text}

【清書後の記録文】`,

    ot: `あなたは作業療法士（OT）の訪問リハビリ記録をサポートするAIです。
以下の音声入力テキストを、訪問看護「別添」に準じた記録として清書してください。

【ルール】
- 記録文体（体言止め・過去形・客観的）で書く
- 個人名は「●●様」のまま記載する
- 以下の順で整理する（情報がある項目のみ）：
  【ADL自立度】食事・更衣・整容・入浴・排泄・移動（Barthel Index準拠）
  【上肢機能・巧緻動作】握力・ピンチ力・巧緻性・協調性
  【認知・高次脳機能】注意・記憶・遂行機能・コミュニケーション
  【作業遂行・参加】役割・余暇・IADL・生活環境

- 意味が不明確な部分は「（要確認）」と記載する

【音声入力テキスト】
${text}

【清書後の記録文】`

  const prompt = PROMPTS[currentRole];

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, role: currentRole })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'エラー');
    aiText = data.text || '（清書に失敗しました）';
    output.textContent = aiText;
  } catch(e) {
    output.innerHTML = '<span class="placeholder">エラーが発生しました。接続を確認してください。</span>';

// コピー・クリア・保存
// ═══════════════════════════════════════════
async function copyText(target) {
  const text = target === 'ai'
    ? aiText
    : document.getElementById('transcriptArea').value;
  if (!text.trim()) { showToast('コピーするテキストがありません'); return; }
  try {
    await navigator.clipboard.writeText(text);
    showToast(target === 'ai' ? 'AI清書をコピーしました' : '録音テキストをコピーしました');
  } catch {
    showToast('コピーに失敗しました');
  }
}

function clearAll() {
  const hasContent = document.getElementById('transcriptArea').value.trim() || aiText;
  if (!hasContent) return;
  if (!confirm('録音テキストとAI清書を全てクリアしますか？')) return;
  accumulated = '';
  aiText = '';
  document.getElementById('transcriptArea').value = '';
  document.getElementById('aiOutput').innerHTML = '<span class="placeholder">「AI清書」ボタンを押すと、録音テキストを報告書文体に整形します。</span>';
  updateCharCount();
  updateAiBtn();
  showToast('クリアしました');
}

}
